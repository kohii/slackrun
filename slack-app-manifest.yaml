display_information:
  name: slackrun
  description: Dispatches Slack mentions and channel events to local commands.
  background_color: "#1f2937"

features:
  bot_user:
    display_name: slackrun
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - channels:history
      - groups:history
      - files:write
      - reactions:write

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
